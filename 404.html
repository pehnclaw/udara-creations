<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Udara Creations</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/logo.png">

    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-base);
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 900;
            font-family: var(--font-heading);
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-container h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-heading);
        }

        .error-container p {
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 2.5rem;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <img src="assets/logo.png" alt="Udara Creations" class="preloader-logo">
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div class="error-container">
        <div class="error-icon"><i class="ph ph-compass"></i></div>
        <div class="error-code">404</div>
        <h1>Lost in Dimensions?</h1>
        <p>The page you are looking for has been moved or doesn't exist in this dimension. Let's get you back to safety.</p>
        <a href="index.html" class="btn-primary">Return to Home</a>
    </div>

    <script>
        // Set theme on load
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Hide preloader
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.add('fade-out');
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 800);
            }
        });
    </script>
</body>
</html>
